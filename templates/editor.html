<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deck Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0d0d14;
    --panel: #11111a;
    --surface: #171722;
    --border: #252535;
    --accent: #00f0ff;
    --accent2: #ff2d6b;
    --accent3: #a855f7;
    --text: #d0d0e8;
    --text-dim: #55556a;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── top bar ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  header .spacer { flex: 1; }

  .grid-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  .grid-controls label { display: flex; align-items: center; gap: 6px; }
  .grid-controls input[type=number] {
    width: 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 6px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    text-align: center;
  }

  .btn-save {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 7px 20px;
    border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-save:hover  { opacity: 0.85; }
  .btn-save:active { transform: scale(0.96); }
  .btn-save.saved  { background: #00ff88; }

  /* ── main layout ── */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── grid area ── */
  #grid-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: auto;
  }

  #grid {
    display: grid;
    gap: 8px;
  }

  .cell {
    width: 110px;
    height: 90px;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    position: relative;
    transition: border-color 0.15s;
  }
  .cell.drag-over {
    border-color: var(--accent);
    background: rgba(0,240,255,0.06);
  }
  .cell.has-btn { border-style: solid; border-color: transparent; }

  .deck-btn {
    position: absolute; inset: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: calc(var(--radius) - 2px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: grab;
    user-select: none;
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .deck-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--btn-color);
    opacity: 0.2;
    border-radius: inherit;
  }
  .deck-btn:hover {
    border-color: rgba(0,240,255,0.4);
    box-shadow: 0 0 12px rgba(0,240,255,0.12);
  }
  .deck-btn.dragging { opacity: 0.35; cursor: grabbing; }

  .deck-btn .d-icon  { font-size: 22px; z-index:1; }
  .deck-btn .d-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    z-index: 1;
    text-align: center;
    padding: 0 4px;
    line-height: 1.2;
  }

  .btn-actions {
    position: absolute;
    top: 3px; right: 3px;
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }
  .deck-btn:hover .btn-actions { opacity: 1; }

  .btn-actions button {
    width: 20px; height: 20px;
    background: rgba(0,0,0,0.7);
    border: none;
    border-radius: 4px;
    color: var(--text);
    cursor: pointer;
    font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .btn-actions button:hover { background: var(--accent2); color: #fff; }
  .btn-actions .edit-btn:hover { background: var(--accent); color: #000; }

  /* add button */
  .add-btn {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    font-size: 24px;
    cursor: pointer;
    border-radius: var(--radius);
    transition: color 0.15s, background 0.15s;
  }
  .add-btn:hover { color: var(--accent); background: rgba(0,240,255,0.05); }

  /* ── side panel ── */
  #panel {
    width: 280px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  #panel-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  #panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .field input, .field select, .field textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 7px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    width: 100%;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .field select option { background: #1a1a28; }

  .color-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .color-row input[type=text] { flex: 1; }
  .color-row input[type=color] {
    width: 36px; height: 36px;
    padding: 2px;
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .color-swatches {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }
  .swatch {
    width: 24px; height: 24px;
    border-radius: 5px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.1s, transform 0.1s;
  }
  .swatch:hover, .swatch.active { border-color: var(--accent); transform: scale(1.15); }

  .panel-empty {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 40px 16px;
    line-height: 1.6;
  }

  .btn-delete {
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    padding: 7px;
    border-radius: 7px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
    margin-top: 6px;
  }
  .btn-delete:hover { background: rgba(255,45,107,0.15); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* toast */
  #toast {
    position: fixed;
    bottom: 16px; left: 50%;
    transform: translateX(-50%) translateY(50px);
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 7px 16px;
    border-radius: 8px;
    opacity: 0;
    transition: transform 0.2s, opacity 0.2s;
    pointer-events: none;
    z-index: 999;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>⚡ Deck Editor</h1>
  <div class="spacer"></div>
  <div class="grid-controls">
    <label>COLS <input type="number" id="cols-input" min="1" max="8" value="3"></label>
    <label>ROWS <input type="number" id="rows-input" min="1" max="8" value="4"></label>
  </div>
  <button class="btn-save" id="save-btn">Save &amp; Push</button>
</header>

<main>
  <div id="grid-wrap">
    <div id="grid"></div>
  </div>
  <div id="panel">
    <div id="panel-header">Button Settings</div>
    <div id="panel-body">
      <div class="panel-empty">Click a button to edit it,<br>or click <strong>+</strong> to add one.</div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
// ── state ──────────────────────────────────────────────────────────────
let layout = { cols: 3, rows: 4, buttons: [] };
let scenes = [];
let inputs = [];
let selectedId = null;
let dragId = null;

const SWATCHES = ['#1a1a2e','#16213e','#0f3460','#533483','#1b4332','#7f1d1d','#1e3a5f','#2d2d2d','#3d2b1f','#1a2a1a'];

const ACTION_LABELS = {
  none:              'None (decoration)',
  scene:             'OBS – Switch Scene',
  toggle_mute:       'OBS – Toggle Mute',
  toggle_stream:     'OBS – Toggle Stream',
  toggle_record:     'OBS – Toggle Record',
  toggle_pause_record:'OBS – Pause/Resume Record',
  hotkey:            'OBS – Trigger Hotkey',
  url:               'Custom URL / Webhook',
};

// ── init ───────────────────────────────────────────────────────────────
async function init() {
  [layout, scenes, inputs] = await Promise.all([
    fetch('/api/layout').then(r=>r.json()),
    fetch('/api/obs/scenes').then(r=>r.json()).then(d=>d.scenes||[]),
    fetch('/api/obs/inputs').then(r=>r.json()).then(d=>d.inputs||[]),
  ]);
  document.getElementById('cols-input').value = layout.cols;
  document.getElementById('rows-input').value = layout.rows;
  renderGrid();
}

// ── grid render ────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `repeat(${layout.cols}, 110px)`;
  grid.style.gridTemplateRows    = `repeat(${layout.rows}, 90px)`;
  grid.innerHTML = '';

  for (let r = 0; r < layout.rows; r++) {
    for (let c = 0; c < layout.cols; c++) {
      const btn = layout.buttons.find(b => b.col === c && b.row === r);
      const cell = document.createElement('div');
      cell.className = 'cell' + (btn ? ' has-btn' : '');
      cell.dataset.col = c;
      cell.dataset.row = r;

      if (btn) {
        cell.appendChild(makeBtnEl(btn));
      } else {
        const add = document.createElement('div');
        add.className = 'add-btn';
        add.textContent = '+';
        add.addEventListener('click', () => addButton(c, r));
        cell.appendChild(add);
      }

      // drag-drop targets
      cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('drag-over'); });
      cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
      cell.addEventListener('drop', e => {
        e.preventDefault();
        cell.classList.remove('drag-over');
        if (dragId === null) return;
        const existing = layout.buttons.find(b => b.col === c && b.row === r);
        if (existing) return; // occupied
        const b = layout.buttons.find(b => b.id === dragId);
        if (b) { b.col = c; b.row = r; }
        renderGrid();
      });

      grid.appendChild(cell);
    }
  }
}

function makeBtnEl(btn) {
  const el = document.createElement('div');
  el.className = 'deck-btn' + (btn.id === selectedId ? ' selected' : '');
  el.style.setProperty('--btn-color', btn.color || '#222');
  el.draggable = true;
  el.dataset.id = btn.id;

  el.innerHTML = `
    <span class="d-icon">${btn.icon||'⚡'}</span>
    <span class="d-label">${btn.label||'Button'}</span>
    <div class="btn-actions">
      <button class="edit-btn" title="Edit">✏️</button>
      <button class="del-btn"  title="Delete">✕</button>
    </div>
  `;

  el.addEventListener('dragstart', () => { dragId = btn.id; el.classList.add('dragging'); });
  el.addEventListener('dragend',   () => { dragId = null;   el.classList.remove('dragging'); });

  el.querySelector('.edit-btn').addEventListener('click', e => { e.stopPropagation(); selectBtn(btn.id); });
  el.querySelector('.del-btn').addEventListener('click',  e => { e.stopPropagation(); deleteBtn(btn.id); });
  el.addEventListener('click', () => selectBtn(btn.id));

  return el;
}

// ── button CRUD ────────────────────────────────────────────────────────
function addButton(col, row) {
  const id = Date.now().toString();
  layout.buttons.push({ id, col, row, label: 'New Button', icon: '⚡', color: '#1a1a2e', action: 'none', value: '' });
  renderGrid();
  selectBtn(id);
}

function deleteBtn(id) {
  layout.buttons = layout.buttons.filter(b => b.id !== id);
  if (selectedId === id) { selectedId = null; renderPanel(null); }
  renderGrid();
}

// ── selection & panel ──────────────────────────────────────────────────
function selectBtn(id) {
  selectedId = id;
  renderGrid();
  renderPanel(layout.buttons.find(b => b.id === id));
}

function renderPanel(btn) {
  const body = document.getElementById('panel-body');
  if (!btn) {
    body.innerHTML = '<div class="panel-empty">Click a button to edit it,<br>or click <strong>+</strong> to add one.</div>';
    return;
  }

  // action value field
  function valueField(action, value) {
    if (action === 'scene') {
      const opts = scenes.map(s => `<option value="${s}" ${s===value?'selected':''}>${s}</option>`).join('');
      return `<select id="f-value"><option value="">-- select scene --</option>${opts}</select>`;
    }
    if (action === 'toggle_mute') {
      const opts = inputs.map(i => `<option value="${i}" ${i===value?'selected':''}>${i}</option>`).join('');
      return `<select id="f-value"><option value="">-- select input --</option>${opts}</select>`;
    }
    if (action === 'none' || action === 'toggle_stream' || action === 'toggle_record' || action === 'toggle_pause_record') {
      return '';
    }
    return `<input id="f-value" type="text" value="${value||''}" placeholder="${action==='url'?'https://...':'hotkey name'}">`;
  }

  const actionOpts = Object.entries(ACTION_LABELS)
    .map(([k,v]) => `<option value="${k}" ${k===btn.action?'selected':''}>${v}</option>`).join('');

  const swatchHtml = SWATCHES.map(c =>
    `<div class="swatch ${c===btn.color?'active':''}" style="background:${c}" data-color="${c}"></div>`
  ).join('');

  const vf = valueField(btn.action, btn.value);

  body.innerHTML = `
    <div class="field">
      <label>Label</label>
      <input id="f-label" type="text" value="${btn.label||''}">
    </div>
    <div class="field">
      <label>Icon (emoji)</label>
      <input id="f-icon" type="text" value="${btn.icon||'⚡'}" style="font-size:20px">
    </div>
    <div class="field">
      <label>Color</label>
      <div class="color-row">
        <input id="f-color-text" type="text" value="${btn.color||'#222'}">
        <input id="f-color-pick" type="color" value="${btn.color||'#222222'}">
      </div>
      <div class="color-swatches">${swatchHtml}</div>
    </div>
    <div class="field">
      <label>Action</label>
      <select id="f-action">${actionOpts}</select>
    </div>
    ${vf ? `<div class="field" id="value-field"><label>Value</label>${vf}</div>` : '<div id="value-field"></div>'}
    <button class="btn-delete" id="del-btn">Delete Button</button>
  `;

  // live update helpers
  function sync() {
    btn.label  = document.getElementById('f-label').value;
    btn.icon   = document.getElementById('f-icon').value;
    btn.color  = document.getElementById('f-color-text').value;
    const vEl  = document.getElementById('f-value');
    btn.value  = vEl ? vEl.value : '';
    renderGrid();
  }

  ['f-label','f-icon'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', sync);
  });

  document.getElementById('f-color-text').addEventListener('input', e => {
    document.getElementById('f-color-pick').value = e.target.value;
    btn.color = e.target.value; renderGrid();
  });
  document.getElementById('f-color-pick').addEventListener('input', e => {
    document.getElementById('f-color-text').value = e.target.value;
    btn.color = e.target.value; renderGrid();
  });

  document.querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      const c = sw.dataset.color;
      btn.color = c;
      document.getElementById('f-color-text').value = c;
      document.getElementById('f-color-pick').value = c;
      document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.dataset.color===c));
      renderGrid();
    });
  });

  document.getElementById('f-action').addEventListener('change', e => {
    btn.action = e.target.value;
    btn.value  = '';
    const vf2  = valueField(btn.action, '');
    document.getElementById('value-field').innerHTML = vf2
      ? `<label style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)">Value</label>${vf2}`
      : '';
    const vEl = document.getElementById('f-value');
    if (vEl) vEl.addEventListener('change', () => { btn.value = vEl.value; });
  });

  const vEl = document.getElementById('f-value');
  if (vEl) vEl.addEventListener('change', sync);

  document.getElementById('del-btn').addEventListener('click', () => deleteBtn(btn.id));
}

// ── grid size controls ─────────────────────────────────────────────────
document.getElementById('cols-input').addEventListener('change', e => {
  layout.cols = Math.max(1, Math.min(8, parseInt(e.target.value)||3));
  // remove out-of-bounds buttons
  layout.buttons = layout.buttons.filter(b => b.col < layout.cols);
  renderGrid();
});
document.getElementById('rows-input').addEventListener('change', e => {
  layout.rows = Math.max(1, Math.min(8, parseInt(e.target.value)||4));
  layout.buttons = layout.buttons.filter(b => b.row < layout.rows);
  renderGrid();
});

// ── save ───────────────────────────────────────────────────────────────
document.getElementById('save-btn').addEventListener('click', async () => {
  const btn = document.getElementById('save-btn');
  await fetch('/api/layout', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(layout)
  });
  // tell deck to reload
  try { new BroadcastChannel('deck').postMessage('reload'); } catch(e){}
  btn.textContent = '✓ Saved!';
  btn.classList.add('saved');
  showToast('Layout saved and pushed to deck');
  setTimeout(() => { btn.textContent = 'Save & Push'; btn.classList.remove('saved'); }, 2000);
});

// ── toast ──────────────────────────────────────────────────────────────
let toastT;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
</body>
</html>
